services:
  proxy:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    networks:
      - frontend
      - backend
  app1:
    build:
      context: ./app1
      dockerfile: Dockerfile
    networks:
      - backend
  app2:
    build:
      context: ./app2
      dockerfile: Dockerfile
    networks:
      - backend
  postgres:
    build:
      context: ./db/postgres
      dockerfile: Dockerfile
    ports:
      - "5432:5432"
    networks:
      - backend
      - dbs
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
  dbs:
    driver: bridge
    internal: true