listen=YES
anonymous_enable=YES
anon_upload_enable=YES
anon_mkdir_write_enable=YES
local_enable=YES
write_enable=YES
chroot_local_user=YES
allow_writeable_chroot=YES
pasv_enable=YES
pasv_min_port=30000
pasv_max_port=30010

# Pour Docker Desktop sur macOS (M1/M2/M3/M4), il est préférable que le serveur
# annonce l'adresse de l'hôte pour les connexions PASV. Docker fournit
# `host.docker.internal` pour résoudre l'IP de la machine hôte depuis le conteneur.
# Résoudre le nom en adresse :
pasv_addr_resolve=YES
# Pour tests locaux depuis la machine hôte Docker Desktop, annonce 127.0.0.1
# (évite le "Passive mode address mismatch" quand tu te connectes depuis
# la même machine). Pour accès depuis le LAN/Internet, remplace par
# l'IP publique ou l'IP LAN du Mac et forwarde les ports.
pasv_address=127.0.0.1

# Activer la connexion depuis le port 20 quand nécessaire
connect_from_port_20=YES

# Forcer l'écoute IPv4 (évite conflit listen vs listen_ipv6)
listen_ipv6=NO

# Désactiver SSL/TLS si vous n'avez pas configuré de certificats dans le conteneur
ssl_enable=NO

# Optionnel : vous pouvez rendre le serveur plus permissif pour PASV derrière NAT
# (à désactiver si vous avez des raisons de sécurité strictes)
pasv_promiscuous=NO
