version: '3.9'

services:
  ftp:
    build: ./ftp
    ports:
      - "20:20"
      - "21:21"
      # Plage PASV utilisée par vsftpd (doit correspondre à pasv_min_port/pasv_max_port)
      - "30000-30010:30000-30010"
    volumes:
      - ./ftp/vsftpd.conf:/etc/vsftpd.conf
      - ./data/ftp:/srv/ftp

  smb:
    image: dperson/samba
    ports:
      - "445:445"
    volumes:
      - ./data/smb:/mount
      - ./smb/smb.conf:/etc/samba/smb.conf

  nfs:
    image: itsthenetwork/nfs-server-alpine
    # The upstream image is amd64-only. On Apple Silicon we can request amd64
    # to run under QEMU emulation. If you prefer native performance and there
    # is an arm64 build, change or remove this line.
    platform: linux/amd64
    privileged: true
    volumes:
      - ./data/nfs:/nfsshare
      # mount the exports file (must be a file, not a directory)
      - ./nfs/exports/exports:/etc/exports:ro

  dns:
    image: internetsystemsconsortium/bind9
    ports:
      - "53:53/udp"
    volumes:
      - ./dns/named.conf:/etc/bind/named.conf

  mail:
    image: mailserver/docker-mailserver:latest
    hostname: mail
    domainname: lab.local
    ports:
      - "25:25"
      - "143:143"
      - "110:110"
    volumes:
      - ./mail/config:/tmp/docker-mailserver
      - ./mail/data:/var/mail
      - ./mail/state:/var/mail-state
      - ./mail/logs:/var/log/mail
    environment:
      ENABLE_IMAP: 1
      ENABLE_POP3: 1
      ENABLE_SIEVE: 0
      SPOOF_PROTECTION: 0

  snmp:
    image: polinux/snmpd
    ports:
      - "161:161/udp"
    volumes:
      - ./snmp/snmpd.conf:/etc/snmp/snmpd.conf

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/my.cnf:/etc/mysql/my.cnf
      - ./data/mysql:/var/lib/mysql

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Password123!"
    ports:
      - "1433:1433"

  oracle:
    image: gvenzl/oracle-xe
    ports:
      - "1521:1521"
    volumes:
      - ./oracle/listener.ora:/opt/oracle/product/21c/dbhomeXE/network/admin/listener.ora

  ipmi:
    image: vapor-ware/ipmi-sim
    ports:
      - "623:623/udp"
    volumes:
      - ./ipmi/ipmi-sim.conf:/etc/ipmi/ipmi-sim.conf